function openImportPreview(plan) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "modal";
  modal.style.maxWidth = "600px";

  const questions = plan.questions || [];
  const qHtml = questions.map((q, i) => `
    <div class="form-group">
      <label>Question ${i + 1}</label>
      <div style="font-size:13px; margin-bottom:6px;">${escapeHtml(q)}</div>
      <input type="text" id="q_${i}" placeholder="Your answer (blank = accept default)" />
    </div>
  `).join("");

  const preview = (plan.tasks || []).slice(0, 25).map(t =>
    `${escapeHtml(t.projectName || "—")} · ${escapeHtml(t.title || "—")} · ${escapeHtml(t.date || "—")} · ${escapeHtml(t.status || "todo")}`
  ).join("<br>");
  const more = Math.max(0, (plan.tasks || []).length - 25);

  modal.innerHTML = `
    <h2>📥 Review import</h2>
    <div style="font-size:13px; color:#6e6e73; margin-bottom:14px;">
      <b>Detected columns:</b> ${escapeHtml(plan.headerDetected || "unknown")}<br>
      ${(plan.projects || []).length} project(s), ${(plan.tasks || []).length} task(s).
    </div>
    ${questions.length ? `<div style="font-size:13px; font-weight:600; margin-bottom:6px; color:#ff9500;">⚠ AI needs clarification before importing</div>${qHtml}` : ""}
    <div style="max-height:220px; overflow-y:auto; background:#f5f5f7; border-radius:8px; padding:10px; font-size:11px; font-family:ui-monospace,Menlo,monospace; line-height:1.5;">
      ${preview || "<i>No tasks extracted.</i>"}
      ${more > 0 ? `<br><i>…+${more} more</i>` : ""}
    </div>
    <div class="modal-actions">
      <button class="btn btn-sec" id="iCancel">Cancel</button>
      <button class="btn" id="iConfirm">${questions.length ? "Import with these answers" : "Import"}</button>
    </div>
  `;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  backdrop.onclick = (e) => { if (e.target === backdrop) document.body.removeChild(backdrop); };
  modal.querySelector("#iCancel").onclick = () => document.body.removeChild(backdrop);
  modal.querySelector("#iConfirm").onclick = () => {
    const answers = questions.map((_, i) => modal.querySelector(`#q_${i}`).value.trim());
    document.body.removeChild(backdrop);
    if (answers.some(a => a.length > 0)) {
      refineImportWithAnswers(plan, questions, answers);
    } else {
      applyImportPlan(plan);
    }
  };
}

async function refineImportWithAnswers(plan, questions, answers) {

function applyImportPlan(plan) {
  const projMap = {};
  (plan.projects || []).forEach(p => {
    if (!p.name) return;
    const existing = state.projects.find(x => x.name.toLowerCase() === p.name.toLowerCase());
    if (existing) { projMap[p.name.toLowerCase()] = existing.id; return; }
    const id = uid();
    state.projects.push({
      id,
      name: p.name,
      color: normalizeHex(p.color) || COLORS[state.projects.length % COLORS.length],
      months: []
    });
    projMap[p.name.toLowerCase()] = id;
  });

  let added = 0;
  (plan.tasks || []).forEach(t => {
    if (!t.title || !t.date || !t.projectName) return;
    const key = t.projectName.toLowerCase();
    let pid = projMap[key];
    if (!pid) {
      const existing = state.projects.find(x => x.name.toLowerCase() === key);
      if (existing) {
        pid = existing.id;
      } else {
        pid = uid();
        state.projects.push({
          id: pid,
          name: t.projectName,
          color: COLORS[state.projects.length % COLORS.length],
          months: []
        });
      }
      projMap[key] = pid;
    }
    const m = t.date.slice(0, 7);
    if (!state.months.includes(m)) state.months.push(m);
    const proj = state.projects.find(x => x.id === pid);
    if (proj && !proj.months.includes(m)) proj.months.push(m);
    const nt = {
      id: uid(),
      projectId: pid,
      title: t.title,
      date: t.date,
      status: STATUSES.includes(t.status) ? t.status : "todo"
    };
    state.tasks.push(nt);
    attachToSeries(nt);
    added++;
  });

  saveState();
  render();
  showToast(`Imported ${added} task(s)`, "success");
}

async function handleQuickAdd(text) {
  const input = document.getElementById("quickAddInput");
  const status = document.getElementById("quickAddStatus");
  status.className = "quick-add-status";
  status.textContent = "Thinking…";
  input.disabled = true;

  try {
    const parsed = await parseQuickAdd(text);
    const { title, date, projectName, status: st } = parsed;
    if (!title || !date || !projectName) throw new Error("Missing fields from AI response.");

    const match = state.projects.find(p => p.name.toLowerCase() === projectName.toLowerCase());
    const projectId = match ? addProject(match.name) : addProject(projectName);

    const taskMonth = date.slice(0, 7);
    if (!state.months.includes(taskMonth)) state.months.push(taskMonth);
    const proj = state.projects.find(p => p.id === projectId);
    if (proj && !proj.months.includes(taskMonth)) proj.months.push(taskMonth);

    const nt = { id: uid(), projectId, title, date, status: STATUSES.includes(st) ? st : "todo" };
    state.tasks.push(nt);
    attachToSeries(nt);
    saveState();
    render();

    input.value = "";
    status.className = "quick-add-status success";
    status.textContent = `✓ ${projectName} · ${date}`;
    showToast(`Added "${title}" to ${projectName}`, "success");
  } catch (e) {
    status.className = "quick-add-status error";
    status.textContent = "Error";
    showToast(e.message || "Quick add failed", "error");
  } finally {
    input.disabled = false;
    input.focus();
    setTimeout(() => { if (status.textContent && !input.value) status.textContent = ""; }, 3500);
  }
}

    }, autoClearMs);
  }
}

let syncTimer = null;
let syncing = false;
let syncPending = false;
function scheduleSync() {
  if (!currentUser) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToRemote, 1200);
}

async function pushToRemote() {
  if (syncing) { syncPending = true; return; }
  if (!currentUser) return;
  syncing = true;
  setSyncStatus("☁ Saving…", "busy");
  try {
    const { error } = await sb.from("app_state").upsert({
      user_id: currentUser.id,
      state,
      updated_at: new Date().toISOString()
    });
    if (error) throw error;
    setSyncStatus("☁ Synced", "ok", 1500);
  } catch (e) {
    setSyncStatus("⚠ " + (e.message || "Sync failed"), "err", 5000);
  } finally {
    syncing = false;
    if (syncPending) { syncPending = false; scheduleSync(); }
  }
}

async function loadRemoteState({ silent = false } = {}) {
  if (!currentUser) { setSyncStatus("☁ Sign in"); return; }
  if (!silent) setSyncStatus("☁ Loading…", "busy");
  try {
    const { data, error } = await sb
      .from("app_state")
      .select("state")
      .eq("user_id", currentUser.id)
      .maybeSingle();
    if (error) throw error;
    if (data && data.state && Object.keys(data.state).length > 0) {
      state = data.state;
      if (!state.appName) state.appName = "📋 Project Manager";
      if (!state.userName) state.userName = "Kailu";
      if (!Array.isArray(state.projects)) state.projects = [];
      if (!Array.isArray(state.tasks)) state.tasks = [];
      if (!Array.isArray(state.months)) state.months = [monthKey(new Date())];
      if (!state.activeMonth) state.activeMonth = monthKey(new Date());
      if (!state.anchorDate) state.anchorDate = isoDate(new Date());
      if (!state.view) state.view = "week";
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
      setSyncStatus("☁ Synced", "ok", 1500);
    } else {
      setSyncStatus("☁ First sync — pushing local data", "", 2000);
      scheduleSync();
    }
  } catch (e) {
    setSyncStatus("⚠ " + (e.message || "Load failed"), "err", 5000);
  }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  setSyncStatus("☁ Sign in");
  openAuthModal();
}

function openAuthModal() {
  const existing = document.querySelector(".auth-backdrop");
  if (existing) return;
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop auth-backdrop";
  const modal = document.createElement("div");
  modal.className = "modal";
  let mode = "signin";

  const renderForm = () => {
    modal.innerHTML = `
      <h2 id="authTitle">${mode === "signin" ? "Sign in" : "Create account"}</h2>
      <p style="font-size:13px; color:#6e6e73; margin-bottom:14px;">
        ${mode === "signin" ? "Sign in to sync your tasks across devices." : "Your tasks sync across any device you sign in on."}
      </p>
      <div class="form-group">
        <label>Email</label>
        <input id="aEmail" type="email" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="aPassword" type="password" autocomplete="${mode === "signin" ? "current-password" : "new-password"}" />
      </div>
      <div id="aError" style="color:#ff3b30; font-size:12px; margin-bottom:10px; display:none;"></div>
      <div id="aInfo" style="color:#34c759; font-size:12px; margin-bottom:10px; display:none;"></div>
      <div class="modal-actions" style="justify-content: space-between; align-items:center;">
        <button class="btn btn-sec" id="aToggle" type="button">${mode === "signin" ? "Need an account? Sign up" : "Have an account? Sign in"}</button>
        <button class="btn" id="aSubmit" type="button">${mode === "signin" ? "Sign in" : "Sign up"}</button>
      </div>
    `;
    modal.querySelector("#aToggle").onclick = () => { mode = mode === "signin" ? "signup" : "signin"; renderForm(); };
    modal.querySelector("#aSubmit").onclick = submit;
    const pw = modal.querySelector("#aPassword");
    pw.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    modal.querySelector("#aEmail").focus();
  };

  const submit = async () => {
    const email = modal.querySelector("#aEmail").value.trim();
    const password = modal.querySelector("#aPassword").value;
    const errEl = modal.querySelector("#aError");
    const infoEl = modal.querySelector("#aInfo");
    errEl.style.display = "none";
    infoEl.style.display = "none";
    if (!email || !password) { errEl.textContent = "Enter email and password."; errEl.style.display = "block"; return; }
    const btn = modal.querySelector("#aSubmit");
    btn.disabled = true;
    btn.textContent = "Working…";
    try {
      if (mode === "signin") {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        document.body.removeChild(backdrop);
      } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        if (data.session) {
          document.body.removeChild(backdrop);
        } else {
          infoEl.textContent = "Account created. Check your email to confirm, then sign in.";
          infoEl.style.display = "block";
          mode = "signin";
          renderForm();
          modal.querySelector("#aEmail").value = email;
          modal.querySelector("#aInfo").textContent = infoEl.textContent;
          modal.querySelector("#aInfo").style.display = "block";
        }
      }
    } catch (e) {
      errEl.textContent = e.message || "Auth failed";
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = mode === "signin" ? "Sign in" : "Sign up";
    }
  };

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  renderForm();
}

async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) {
    await loadRemoteState({ silent: true });
  } else {
    setSyncStatus("☁ Sign in");
    openAuthModal();
  }
  sb.auth.onAuthStateChange((event, session) => {
    const prev = currentUser?.id;
    currentUser = session?.user || null;
    if (currentUser && currentUser.id !== prev) {
      loadRemoteState({ silent: true });
    } else if (!currentUser) {
      setSyncStatus("☁ Sign in");
    }
  });
}

document.getElementById("headerSync").onclick = () => {
  if (currentUser) openSettingsModal();
  else openAuthModal();
};

/* =========================================================
   Weather
   ========================================================= */
function weatherEmoji(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "⛅";
  if (code <= 48) return "🌫️";
  if (code <= 57) return "🌦️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌦️";
  if (code <= 86) return "🌨️";
  if (code <= 99) return "⛈️";
  return "🌡";
}
function loadWeather() {
  const el = document.getElementById("headerWeather");
  if (!navigator.geolocation) { el.textContent = "Weather unavailable"; return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`;
      const r = await fetch(url);
      const d = await r.json();
      const temp = Math.round(d.current.temperature_2m);
      const code = d.current.weather_code;
      el.textContent = `${weatherEmoji(code)} ${temp}°F`;
    } catch (e) {
      el.textContent = "Weather unavailable";
    }
  }, () => {
    el.textContent = "Weather needs location permission";
  }, { maximumAge: 10 * 60 * 1000, timeout: 10000 });
}

render();
updateUndoRedoButtons();
loadWeather();
initAuth();
</script>
