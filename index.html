function startInlineAdd(container, projectId, dateStr) {
  const existing = container.querySelector(".inline-add-input");
  if (existing) { existing.focus(); return; }
  const input = document.createElement("input");
  input.className = "inline-add-input";
  input.type = "text";
  input.placeholder = "New task…";
  input.style.cssText = "border:1px solid #007aff; border-radius:4px; padding:4px 6px; font-size:12px; font-family:inherit; outline:none; width:100%; background:#fff;";
  container.appendChild(input);
  input.focus();
  let done = false;
  const commit = () => {
    if (done) return;
    done = true;
    const val = input.value.trim();
    if (val) {
      const taskMonth = dateStr.slice(0, 7);
      if (!state.months.includes(taskMonth)) state.months.push(taskMonth);
      const proj = state.projects.find(p => p.id === projectId);
      if (proj && !proj.months.includes(taskMonth)) proj.months.push(taskMonth);
      const nt = { id: uid(), projectId, title: val, date: dateStr, status: "todo" };
      state.tasks.push(nt);
      attachToSeries(nt);
      saveState();
    }
    render();
  };
  const cancel = () => { if (done) return; done = true; render(); };
  input.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if (e.key === "Enter") { e.preventDefault(); commit(); }
    else if (e.key === "Escape") { e.preventDefault(); cancel(); }
  });
  input.addEventListener("blur", commit);
  input.addEventListener("click", (e) => e.stopPropagation());
}

function renderTasksInto(container, tasks, proj) {
  const seenGroups = new Set();
  tasks.forEach(t => {
    if (!t.groupId) {
      container.appendChild(taskEl(t, proj));
      return;
    }
    if (seenGroups.has(t.groupId)) return;
    seenGroups.add(t.groupId);
    const gid = t.groupId;
    const members = tasks.filter(x => x.groupId === gid);
    container.appendChild(buildGroupEl(gid, members, proj));
  });
}

function buildGroupEl(gid, members, proj) {
  const group = (state.groups || []).find(g => g.id === gid);
  const wrap = document.createElement("div");
  wrap.className = "task-group";
  const header = document.createElement("div");
  header.className = "task-group-header";
  const nameSpan = document.createElement("span");
  nameSpan.className = "name";
  const currentName = group ? group.name : "";
  if (currentName) {
    nameSpan.textContent = currentName;
  } else {
    nameSpan.textContent = "Name this group…";
    nameSpan.classList.add("placeholder");
  }
  nameSpan.title = "Click to rename";
  nameSpan.onclick = (e) => { e.stopPropagation(); editGroupNameInline(gid, nameSpan); };
  header.appendChild(nameSpan);
  const ungroupBtn = document.createElement("button");
  ungroupBtn.className = "ungroup-btn";
  ungroupBtn.textContent = "×";
  ungroupBtn.title = "Delete group and all tasks in it";
  ungroupBtn.onclick = (e) => { e.stopPropagation(); deleteGroup(gid); };
  header.appendChild(ungroupBtn);
  wrap.appendChild(header);
  members.forEach(t => wrap.appendChild(taskEl(t, proj)));
  wrap.onclick = (e) => e.stopPropagation();
  if (group && !group.name && _focusGroupOnRender === gid) {
    _focusGroupOnRender = null;
    setTimeout(() => editGroupNameInline(gid, nameSpan), 0);
  }
  return wrap;
}

let _focusGroupOnRender = null;

function editGroupNameInline(gid, nameSpan) {
  const group = (state.groups || []).find(g => g.id === gid);
  if (!group) return;
  const input = document.createElement("input");
  input.type = "text";
  input.className = "name-input";
  input.value = group.name || "";
  input.placeholder = "Group name";
  nameSpan.replaceWith(input);
  input.focus();
  input.select();
  let done = false;
  const finish = (commit) => {
    if (done) return;
    done = true;
    const v = input.value.trim();
    if (commit && v && v !== group.name) {
      group.name = v;
      saveState();
      render();
    } else if (commit && !v && !group.name) {
      render();
    } else {
      render();
    }
  };
  input.onkeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); finish(true); }
    else if (e.key === "Escape") { e.preventDefault(); finish(false); }
  };
  input.onblur = () => finish(true);
  input.onclick = (e) => e.stopPropagation();
}

function taskEl(t, proj) {
  const el = document.createElement("div");
  const completedLater = laterDoneInSeries(t);
  const carried = !completedLater ? carriedForward(t) : null;
  const onToday = isToday(t.date);
  el.className = "task"
    + (t.status === "done" ? " done" : "")
    + (completedLater && !onToday ? " done-later" : "")
    + (carried && !onToday ? " carried" : "")
    + (t.archived && !onToday ? " archived" : "");
  if (selectedTaskIds.has(t.id)) el.classList.add("selected");
  const inSeries = !!t.seriesId && state.tasks.some(x => x.id !== t.id && x.seriesId === t.seriesId);
  if (inSeries) el.classList.add("in-series");
  if (completedLater) el.title = `Completed on ${completedLater.date}`;
  else if (carried) el.title = `Carried forward to ${carried.date}`;
  el.draggable = true;
  el.addEventListener("dragstart", (e) => {
    let ids;
    if (selectedTaskIds.has(t.id) && selectedTaskIds.size > 1) {
      ids = [...selectedTaskIds];
    } else {
      ids = [t.id];
    }
    const payload = ids.length === 1 ? ids[0] : JSON.stringify(ids);
    e.dataTransfer.setData("text/plain", payload);
    e.dataTransfer.effectAllowed = "copyMove";
    if (ids.length > 1) {
      ids.forEach(id => {
        const o = document.querySelector(`.task[data-task-id="${id}"]`);
        if (o) o.classList.add("dragging");
      });
    } else {
      el.classList.add("dragging");
    }
  });
  el.addEventListener("dragend", () => {
    document.querySelectorAll(".task.dragging").forEach(x => x.classList.remove("dragging"));
  });
  el.dataset.taskId = t.id;

  const stat = document.createElement("button");
  stat.className = "task-status";
  stat.textContent = STATUS_EMOJI[t.status];
  stat.title = `Status: ${STATUS_LABEL[t.status]} (click to cycle)`;
  stat.onclick = (e) => { e.stopPropagation(); cycleStatus(t.id); };
  el.appendChild(stat);

  const title = document.createElement("span");
  title.className = "task-title";
  title.textContent = t.title;
  el.appendChild(title);

  const actions = document.createElement("span");
  actions.className = "task-actions";
  const move = document.createElement("button");
  move.className = "task-act-btn";
  move.textContent = "→";
  move.title = "Move to next day";
  move.onclick = (e) => { e.stopPropagation(); moveTaskToNextDay(t.id); };
  actions.appendChild(move);
  const del = document.createElement("button");
  del.className = "task-act-btn";
  del.textContent = "×";
  del.title = "Delete";
  del.onclick = (e) => { e.stopPropagation(); deleteTask(t.id); };
  actions.appendChild(del);
  el.appendChild(actions);

  el.onclick = (e) => {
    e.stopPropagation();
    if (e.metaKey || e.ctrlKey) {
      if (selectedTaskIds.has(t.id)) selectedTaskIds.delete(t.id);
      else selectedTaskIds.add(t.id);
      el.classList.toggle("selected", selectedTaskIds.has(t.id));
      updateSelectionBar();
      return;
    }
    startEditTitle(t, title, el);
  };
  el.oncontextmenu = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (!selectedTaskIds.has(t.id)) {
      selectedTaskIds.clear();
      selectedTaskIds.add(t.id);
      document.querySelectorAll(".task.selected").forEach(x => x.classList.remove("selected"));
      el.classList.add("selected");
      updateSelectionBar();
    }
    showTaskContextMenu(e.clientX, e.clientY);
  };
  attachTaskReorderDrop(el, t);
  return el;
}

function clearSelection() {
  selectedTaskIds.clear();
  document.querySelectorAll(".task.selected").forEach(x => x.classList.remove("selected"));
  updateSelectionBar();
}

function updateSelectionBar() {
  let bar = document.getElementById("selectionBar");
  if (selectedTaskIds.size === 0) {
    if (bar) bar.remove();
    return;
  }
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "selectionBar";
    bar.className = "selection-bar";
    document.body.appendChild(bar);
  }
  const anyGrouped = state.tasks.some(t => selectedTaskIds.has(t.id) && t.groupId);
  const allArchived = state.tasks.filter(t => selectedTaskIds.has(t.id)).every(t => t.archived);
  bar.innerHTML = `
    <span class="sel-count">${selectedTaskIds.size} selected</span>
    <button class="btn" id="selGroup">${selectedTaskIds.size > 1 ? "Group" : "Group (need 2+)"}</button>
    ${anyGrouped ? `<button class="btn btn-sec" id="selUngroup">Ungroup</button>` : ""}
    <button class="btn btn-sec" id="selArchive">${allArchived ? "Restore" : "Archive"}</button>
    <button class="btn btn-sec" id="selClear">Clear</button>
  `;
  const gBtn = bar.querySelector("#selGroup");
  if (gBtn) gBtn.onclick = groupSelectedTasks;
  if (gBtn && selectedTaskIds.size < 2) gBtn.disabled = true;
  const uBtn = bar.querySelector("#selUngroup");
  if (uBtn) uBtn.onclick = ungroupSelectedTasks;
  bar.querySelector("#selArchive").onclick = () => {
    const ids = [...selectedTaskIds];
    if (allArchived) unarchiveTasks(ids);
    else archiveTasks(ids);
    selectedTaskIds.clear();
    updateSelectionBar();
  };
  bar.querySelector("#selClear").onclick = clearSelection;
}

function groupSelectedTasks() {
  if (selectedTaskIds.size < 2) return;
  const id = uid();
  state.groups = state.groups || [];
  state.groups.push({ id, name: "" });
  state.tasks.forEach(t => { if (selectedTaskIds.has(t.id)) t.groupId = id; });
  selectedTaskIds.clear();
  _focusGroupOnRender = id;
  saveState();
  render();
}

function ungroupSelectedTasks() {
  state.tasks.forEach(t => { if (selectedTaskIds.has(t.id)) delete t.groupId; });
  pruneEmptyGroups();
  selectedTaskIds.clear();
  saveState();
  render();
}

function pruneEmptyGroups() {
  if (!state.groups) return;
  const used = new Set(state.tasks.map(t => t.groupId).filter(Boolean));
  state.groups = state.groups.filter(g => used.has(g.id));
}

function renameGroup(groupId, newName) {
  const g = (state.groups || []).find(x => x.id === groupId);
  if (!g) return;
  g.name = newName;
  saveState();
  render();
}

function ungroupGroup(groupId) {
  state.tasks.forEach(t => { if (t.groupId === groupId) delete t.groupId; });
  state.groups = (state.groups || []).filter(g => g.id !== groupId);
  saveState();
  render();
}

function deleteGroup(groupId) {
  state.tasks = state.tasks.filter(t => t.groupId !== groupId);
  state.groups = (state.groups || []).filter(g => g.id !== groupId);
  saveState();
  render();
}

let _ctxMenuEl = null;

    document.addEventListener("scroll", closeContextMenu, true);
    window.addEventListener("resize", closeContextMenu);

}

function attachTaskReorderDrop(el, targetTask) {
  el.addEventListener("dragover", (e) => {
    if (!e.dataTransfer.types.includes("text/plain")) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = e.altKey ? "copy" : "move";
    const r = el.getBoundingClientRect();
    const above = (e.clientY - r.top) < r.height / 2;
    el.classList.toggle("task-drop-above", above);
    el.classList.toggle("task-drop-below", !above);
  });
  el.addEventListener("dragleave", () => {
    el.classList.remove("task-drop-above", "task-drop-below");
  });
  el.addEventListener("drop", (e) => {
    if (!e.dataTransfer.types.includes("text/plain")) return;
    e.preventDefault();
    e.stopPropagation();
    const r = el.getBoundingClientRect();
    const above = (e.clientY - r.top) < r.height / 2;
    el.classList.remove("task-drop-above", "task-drop-below");
    const ids = readDragIds(e);
    if (ids.length === 0) return;
    moveTasksToPosition(ids, targetTask, above ? "before" : "after", e.altKey);
  });
}

function moveTasksToPosition(ids, targetTask, mode, duplicate) {
  const newMonth = targetTask.date.slice(0, 7);
  if (!state.months.includes(newMonth)) state.months.push(newMonth);
  const proj = state.projects.find(p => p.id === targetTask.projectId);
  if (proj && !proj.months.includes(newMonth)) proj.months.push(newMonth);

  const moving = [];
  if (duplicate) {
    ids.forEach(id => {
      const src = state.tasks.find(t => t.id === id);
      if (!src) return;
      const copy = { ...src, id: uid(), projectId: targetTask.projectId, date: targetTask.date };
      if (targetTask.groupId) copy.groupId = targetTask.groupId; else delete copy.groupId;
      moving.push(copy);
    });
  } else {
    ids.forEach(id => {
      if (id === targetTask.id) return;
      const idx = state.tasks.findIndex(t => t.id === id);
      if (idx < 0) return;
      const [src] = state.tasks.splice(idx, 1);
      src.projectId = targetTask.projectId;
      src.date = targetTask.date;
      if (targetTask.groupId) src.groupId = targetTask.groupId; else delete src.groupId;
      moving.push(src);
    });
  }
  if (moving.length === 0) return;
  const tIdx = state.tasks.findIndex(t => t.id === targetTask.id);
  const insertAt = tIdx < 0 ? state.tasks.length : (mode === "before" ? tIdx : tIdx + 1);
  state.tasks.splice(insertAt, 0, ...moving);
  pruneEmptyGroups();
  saveState();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function normalizeHex(v) {
  if (!v) return null;
  v = v.trim();
  if (!v.startsWith("#")) v = "#" + v;
  if (/^#[0-9a-f]{3}$/i.test(v)) {
    return "#" + v.slice(1).split("").map(c => c + c).join("").toLowerCase();
  }
  if (/^#[0-9a-f]{6}$/i.test(v)) return v.toLowerCase();
  return null;
}

function bindColorControls(modal, initial, onChange) {
  let selected = initial;
  const hexInput = modal.querySelector("#pHex");
  const picker = modal.querySelector("#pPick");
  const sync = (c, skipHex) => {
    selected = c;
    modal.querySelectorAll(".color-swatch").forEach(s => {
      s.classList.toggle("selected", s.dataset.color.toLowerCase() === c.toLowerCase());
    });
    picker.value = normalizeHex(c) || "#000000";
    if (!skipHex) hexInput.value = c;
    onChange(c);
  };
  modal.querySelectorAll(".color-swatch").forEach(sw => {
    sw.onclick = () => sync(sw.dataset.color);
  });
  hexInput.addEventListener("input", () => {
    const n = normalizeHex(hexInput.value);
    if (n) sync(n, true);
  });
  picker.addEventListener("input", () => sync(picker.value));
  return () => selected;
}

function mergeProjects(canonicalId, duplicateIds) {
  const canonical = state.projects.find(p => p.id === canonicalId);
  if (!canonical) return 0;
  let movedTasks = 0;
  duplicateIds.forEach(dupId => {
    if (dupId === canonicalId) return;
    const dup = state.projects.find(p => p.id === dupId);
    if (!dup) return;
    state.tasks.forEach(t => { if (t.projectId === dupId) { t.projectId = canonicalId; movedTasks++; } });
    (dup.months || []).forEach(m => { if (!canonical.months.includes(m)) canonical.months.push(m); });
    if (state.projectHeights && state.projectHeights[dupId]) {
      if (!state.projectHeights[canonicalId]) state.projectHeights[canonicalId] = state.projectHeights[dupId];
      delete state.projectHeights[dupId];
    }
  });
  state.projects = state.projects.filter(p => !duplicateIds.includes(p.id) || p.id === canonicalId);
  saveState();
  render();
  return movedTasks;
}

async function openProjectMergeModal(seedProjId) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "modal";
  modal.style.maxWidth = "560px";
  modal.innerHTML = `
    <h2>🔗 Find similar projects</h2>
    <div id="pmStatus" style="font-size:13px; color:#6e6e73; margin-bottom:12px;">Asking AI to group your projects…</div>

    </div>
  `;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  const close = () => document.body.removeChild(backdrop);
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  modal.querySelector("#pmClose").onclick = close;

  const key = getApiKey();
  const statusEl = modal.querySelector("#pmStatus");
  const groupsEl = modal.querySelector("#pmGroups");
  const items = state.projects.map(p => ({ id: p.id, name: p.name, color: p.color }));
  if (items.length < 2) { statusEl.textContent = "Only one project exists — nothing to merge."; return; }

  let groups = [];
  if (!key) {
    const byName = new Map();
    state.projects.forEach(p => {
      const k = normTitle(p.name);
      if (!byName.has(k)) byName.set(k, []);
      byName.get(k).push(p.id);
    });
    groups = [...byName.values()].filter(arr => arr.length > 1).map(ids => ({ ids, canonical: ids[0], reason: "exact name match" }));
  } else {
    try {
      const body = {
        model: CLAUDE_MODEL,
        max_tokens: 2000,
        system: [{ type: "text", text: "You identify projects that refer to the same real project despite small name differences (typos, capitalization, spacing, minor wording). Return groups of project ids you're confident belong together. Only group when you're confident they're the same project — err on the side of NOT grouping. Pick one id as the canonical (prefer the most complete/correctly-spelled name)." }],
        tools: [{
          name: "group_projects",
          description: "Group similar project ids.",
          input_schema: {
            type: "object",
            properties: {
              groups: {
                type: "array",
                items: {
                  type: "object",
                  properties: {
                    ids: { type: "array", items: { type: "string" } },
                    canonical: { type: "string" },
                    reason: { type: "string" }
                  },
                  required: ["ids", "canonical"]
                }
              }
            },
            required: ["groups"]
          }
        }],
        tool_choice: { type: "tool", name: "group_projects" },
        messages: [{ role: "user", content: `Projects:\n${JSON.stringify(items)}` }]
      };
      const res = await fetch(CLAUDE_API_URL, {
        method: "POST",
        headers: { "content-type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        const data = await res.json();
        const tb = (data.content || []).find(b => b.type === "tool_use");
        groups = (tb?.input?.groups || []).filter(g => Array.isArray(g.ids) && g.ids.length >= 2);
      }
    } catch {}
  }

  if (groups.length === 0) { statusEl.textContent = "No similar projects found."; return; }

  statusEl.textContent = `Found ${groups.length} group${groups.length > 1 ? "s" : ""} of likely-duplicate projects. Pick one as canonical and merge.`;
  const byId = Object.fromEntries(state.projects.map(p => [p.id, p]));
  groupsEl.innerHTML = groups.map((g, i) => {
    const opts = g.ids.filter(id => byId[id])
      .map(id => `<option value="${id}" ${id === g.canonical ? "selected" : ""}>${escapeHtml(byId[id].name)}</option>`).join("");
    const preview = g.ids.filter(id => byId[id]).map(id => `
      <div style="display:flex; align-items:center; gap:6px; font-size:12px; color:#6e6e73;">
        <span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${byId[id].color};"></span>
        ${escapeHtml(byId[id].name)}
      </div>
    `).join("");
    return `
      <div style="background:#f5f5f7; border-radius:8px; padding:12px; margin-bottom:10px;" data-idx="${i}">
        <div style="margin-bottom:8px;">${preview}</div>
        ${g.reason ? `<div style="font-size:11px; color:#8e8e93; margin-bottom:8px;">AI reason: ${escapeHtml(g.reason)}</div>` : ""}
        <div style="display:flex; gap:8px; align-items:center;">
          <label style="font-size:12px;">Keep as:</label>
          <select data-role="canonical" style="flex:1; padding:4px 8px; border:1px solid #d2d2d7; border-radius:6px; font-size:13px;">${opts}</select>
          <button class="btn" data-role="merge" style="padding:6px 12px; font-size:12px;">Merge</button>
        </div>
      </div>
    `;
  }).join("");
  groupsEl.querySelectorAll('[data-idx]').forEach(el => {
    const idx = parseInt(el.getAttribute("data-idx"));
    el.querySelector('[data-role="merge"]').onclick = () => {
      const canonicalId = el.querySelector('[data-role="canonical"]').value;
      const moved = mergeProjects(canonicalId, groups[idx].ids);
      el.remove();
      showToast(`Merged — moved ${moved} task(s) to ${byId[canonicalId]?.name || "canonical project"}`, "success");
      if (groupsEl.children.length === 0) statusEl.textContent = "All groups merged.";
    };
  });
}

async function parseQuickAddClaude(text) {
  const key = getApiKey();
  if (!key) {
    openSettingsModal();
    throw new Error("Set your Claude API key first.");
  }

  const today = isoDate(new Date());
  const weekday = new Date().toLocaleDateString(undefined, { weekday: "long" });
  const projectList = state.projects.map(p => `- ${p.name} (active months: ${p.months.join(", ")})`).join("\n") || "(no projects yet)";

  const system = [
    {
      type: "text",
      text: "You parse short natural-language task descriptions into structured task records for a personal project-management app. Always emit the create_task tool with a concise title, an ISO date, a projectName (reuse an existing project when the input clearly matches one; otherwise invent a short Title-Case name), and status. If the user does not mention a status, default to \"todo\".",
      cache_control: { type: "ephemeral" }
    },
    {
      type: "text",
      text: `Today is ${weekday}, ${today}.\n\nExisting projects:\n${projectList}`
    }
  ];

  const tools = [{
    name: "create_task",
    description: "Create a single task. Call exactly once.",
    input_schema: {
      type: "object",
      properties: {
        title: { type: "string", description: "Short, imperative task title (3–8 words)." },
        date: { type: "string", description: "ISO date YYYY-MM-DD. Resolve relative phrases like 'tomorrow', 'next Tuesday', 'Friday' against today." },
        projectName: { type: "string", description: "Project name. Prefer an existing project name (case-insensitive match); otherwise a short Title-Case name inferred from context." },
        status: { type: "string", enum: STATUSES, description: "Task status. Default 'todo' unless user says otherwise." }
      },
      required: ["title", "date", "projectName", "status"]
    }
  }];

  const body = {
    model: CLAUDE_MODEL,
    max_tokens: 512,
    system,
    tools,
    tool_choice: { type: "tool", name: "create_task" },
    messages: [{ role: "user", content: text }]
  };

  const res = await fetch(CLAUDE_API_URL, {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`API ${res.status}: ${errText.slice(0, 200)}`);
  }
  const data = await res.json();
  const toolBlock = (data.content || []).find(b => b.type === "tool_use" && b.name === "create_task");
  if (!toolBlock) throw new Error("Claude did not return a create_task call.");
  return toolBlock.input;
}

/* ---- Gemini Nano (Chrome built-in, on-device) ---- */
const PROVIDER_STORAGE = "pm_provider"; // "claude" | "nano"
function getProvider() {
  const p = localStorage.getItem(PROVIDER_STORAGE);
  if (p) return p;
  return getApiKey() ? "claude" : "nano";
}
function setProvider(p) { localStorage.setItem(PROVIDER_STORAGE, p); }

function hasNanoApi() {
  return typeof LanguageModel !== "undefined" || !!(window.ai && window.ai.languageModel);
}
async function nanoAvailability() {
  try {
    if (typeof LanguageModel !== "undefined") return await LanguageModel.availability();
    if (window.ai?.languageModel) {
      const caps = await window.ai.languageModel.capabilities();
      // Older API: "readily" | "after-download" | "no"
      return caps.available === "readily" ? "available"
           : caps.available === "after-download" ? "downloadable"
           : "unavailable";
    }
  } catch (e) { return "error:" + (e.message || e); }
  return "no-api";
}
async function nanoCreate(options = {}) {
  if (typeof LanguageModel !== "undefined") return await LanguageModel.create(options);
  if (window.ai?.languageModel) return await window.ai.languageModel.create(options);
  throw new Error("Prompt API not available in this browser.");
}

async function parseQuickAddNano(text) {
  const avail = await nanoAvailability();
  if (avail !== "available") {
    throw new Error(`Gemini Nano not ready (${avail}). Open Settings → Set up Gemini Nano.`);
  }
  const today = isoDate(new Date());
  const weekday = new Date().toLocaleDateString(undefined, { weekday: "long" });
  const projectList = state.projects.map(p => p.name).join(", ") || "(none)";

  const systemPrompt =
    `You convert a short natural-language task description into JSON. ` +
    `Today is ${weekday}, ${today}. Existing projects: ${projectList}. ` +
    `Reuse an existing project name (case-insensitive) when it fits; otherwise invent a short Title-Case name. ` +
    `Resolve relative dates like "tomorrow" or "next Tuesday" against today. ` +
    `Default status to "todo" unless the user says otherwise.`;

  const schema = {
    type: "object",
    properties: {
      title: { type: "string" },
      date: { type: "string", pattern: "^\\d{4}-\\d{2}-\\d{2}$" },
      projectName: { type: "string" },
      status: { type: "string", enum: STATUSES }
    },
    required: ["title", "date", "projectName", "status"]
  };

  let session;
  try {
    session = await nanoCreate({ initialPrompts: [{ role: "system", content: systemPrompt }] });
  } catch (e) {
    // Fallback: older API doesn't accept initialPrompts — use systemPrompt option
    session = await nanoCreate({ systemPrompt });
  }
  let raw;
  try {
    raw = await session.prompt(text, { responseConstraint: schema });
  } catch (e) {
    // Older Chrome versions without responseConstraint — ask for JSON explicitly
    raw = await session.prompt(
      `${text}\n\nReply with ONLY a JSON object matching: {"title":string,"date":"YYYY-MM-DD","projectName":string,"status":"todo"|"doing"|"done"}. No prose.`
    );
  }
  session.destroy?.();

  // Strip possible code fences
  raw = String(raw).trim().replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/, "");
  return JSON.parse(raw);
}

async function parseQuickAdd(text) {
  const provider = getProvider();
  if (provider === "nano") return parseQuickAddNano(text);
  return parseQuickAddClaude(text);
}

/* =========================================================
   Export / Import
   ========================================================= */
function csvEscape(v) {
  const s = String(v ?? "");
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function buildExportRows() {
  const rows = [["Project", "Color", "Group", "Task", "Date", "Status", "Months"]];
  state.projects.forEach(p => {
    const projTasks = state.tasks.filter(t => t.projectId === p.id);
    if (projTasks.length === 0) {
      rows.push([p.name, p.color, "", "", "", "", (p.months || []).join("|")]);
    } else {
      projTasks.forEach(t => {
        const grp = t.groupId && state.groups ? state.groups.find(g => g.id === t.groupId) : null;
        rows.push([p.name, p.color, grp ? grp.name : "", t.title, t.date, t.status, (p.months || []).join("|")]);
      });
    }
  });
  state.tasks
    .filter(t => !state.projects.find(p => p.id === t.projectId))
    .forEach(t => rows.push(["", "", "", t.title, t.date, t.status, ""]));
  return rows;
}

function exportToXLSX() {
  if (typeof XLSX === "undefined") {
    showToast("XLSX library not loaded — using CSV", "error");
    exportToCSV();
    return;
  }
  const rows = buildExportRows();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const widths = [22, 10, 16, 40, 12, 10, 22];
  ws["!cols"] = widths.map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tasks");
  XLSX.writeFile(wb, `pm-export-${isoDate(new Date())}.xlsx`);
  showToast("Exported XLSX", "success");
}

function exportToCSV() {
  const rows = buildExportRows();
  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pm-export-${isoDate(new Date())}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Exported CSV", "success");
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; continue; }
        inQuotes = false;
      } else field += c;
      continue;
    }
    if (c === '"') { inQuotes = true; continue; }
    if (c === ",") { row.push(field); field = ""; continue; }
    if (c === "\r") continue;
    if (c === "\n") {
      row.push(field); field = "";
      if (row.some(v => v.length > 0)) rows.push(row);
      row = [];
      continue;
    }
    field += c;
  }
  if (field.length > 0 || row.length > 0) {
    row.push(field);
    if (row.some(v => v.length > 0)) rows.push(row);
  }
  return rows;
}

function cellToISODate(cell, fallbackYear) {
  if (cell == null || cell === "") return null;
  if (cell instanceof Date && !isNaN(cell)) {
    const y = cell.getFullYear(), m = cell.getMonth() + 1, d = cell.getDate();
    return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }
  const s = String(cell).trim();
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?$/);
  if (m) {
    const mo = parseInt(m[1], 10);
    const da = parseInt(m[2], 10);
    let yr = m[3] ? parseInt(m[3], 10) : fallbackYear;
    if (yr < 100) yr += 2000;
    if (mo >= 1 && mo <= 12 && da >= 1 && da <= 31) {
      return `${yr}-${String(mo).padStart(2,"0")}-${String(da).padStart(2,"0")}`;
    }
  }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) {
    const yr = parseInt(m[1], 10), mo = parseInt(m[2], 10), da = parseInt(m[3], 10);
    if (mo >= 1 && mo <= 12 && da >= 1 && da <= 31) {
      return `${yr}-${String(mo).padStart(2,"0")}-${String(da).padStart(2,"0")}`;
    }
  }
  // Excel serial date number (days since 1899-12-30, accounting for the 1900 leap-year bug).
  const n = Number(s);
  if (Number.isFinite(n) && n > 20000 && n < 80000) {
    const epoch = Date.UTC(1899, 11, 30);
    const d = new Date(epoch + n * 86400000);
    if (!isNaN(d)) return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  return null;
}

function detectCalendarGridDateRow(rows, fallbackYear) {
  for (let i = 0; i < Math.min(rows.length, 12); i++) {
    const r = rows[i] || [];
    let count = 0;
    for (const c of r) if (cellToISODate(c, fallbackYear)) count++;
    if (count >= 4) return i;
  }
  return -1;
}

function inferYearFromContext(sheetHint, rows) {
  const fromHint = String(sheetHint || "").match(/(20\d{2})/);
  if (fromHint) return parseInt(fromHint[1], 10);
  for (const r of rows) for (const c of r) {
    const m = String(c || "").match(/(20\d{2})/);
    if (m) return parseInt(m[1], 10);
  }
  return new Date().getFullYear();
}

function parseCalendarGridSheet(rows, sheetHint) {
  const fallbackYear = inferYearFromContext(sheetHint, rows);
  const dateRowIdx = detectCalendarGridDateRow(rows, fallbackYear);
  console.log("[grid-parser] sheet:", sheetHint, "rows:", rows.length, "date row:", dateRowIdx);
  if (dateRowIdx < 0) return null;
  const colToDate = {};
  rows[dateRowIdx].forEach((cell, idx) => {
    const iso = cellToISODate(cell, fallbackYear);
    if (iso) colToDate[idx] = iso;
  });
  console.log("[grid-parser] date columns:", Object.keys(colToDate).length, "first 3 dates:", Object.values(colToDate).slice(0, 3));
  if (Object.keys(colToDate).length === 0) return null;

  const STATUS_RULES = [
    { rx: /^(?:✅|✔️|✓|☑|\[x\]|\[X\])\s*/u, status: "done" },
    { rx: /^(?:🟡|🟠|🔵|⏳|\[~\])\s*/u, status: "doing" },
    { rx: /^(?:⬜️|⬜|☐|□|\[ \])\s*/u, status: "todo" }
  ];

  const tasks = [];
  const projectNames = new Set();
  for (let r = dateRowIdx + 1; r < rows.length; r++) {
    const row = rows[r] || [];
    const projectRaw = String(row[0] || "").trim();
    const dateColIdxs = Object.keys(colToDate);
    const hasContent = dateColIdxs.some(idx => String(row[idx] || "").trim());
    if (!hasContent) continue;
    const project = projectRaw || "Notes";
    for (const idxStr of dateColIdxs) {
      const idx = parseInt(idxStr, 10);
      const cell = String(row[idx] || "").replace(/\r\n?/g, "\n").trim();
      if (!cell) continue;
      const pieces = cell.split(/\n+/).map(s => s.trim()).filter(Boolean);
      for (const p of pieces) {
        let title = p;
        let status = "todo";
        for (const { rx, status: st } of STATUS_RULES) {
          if (rx.test(title)) { status = st; title = title.replace(rx, "").trim(); break; }
        }
        if (!title) continue;
        tasks.push({ projectName: project, title, date: colToDate[idx], status, _sourceSheet: sheetHint });
        projectNames.add(project);
      }
    }
  }
  console.log("[grid-parser] extracted", tasks.length, "tasks across", projectNames.size, "projects");
  if (tasks.length === 0) return null;
  return {
    projects: [...projectNames].map(name => ({ name })),
    tasks,
    questions: [],
    headerDetected: `calendar-grid (date row ${dateRowIdx})`,
    _sheetNames: sheetHint ? [sheetHint] : []
  };
}

async function parseImportedCSVWithAI(rows, sheetHint) {
  const key = getApiKey();
  if (!key) { openSettingsModal(); throw new Error("Set your Claude API key first."); }

  const sample = rows.slice(0, 1500);
  const truncated = rows.length > 1500 ? `\n[Note: this sheet has ${rows.length} rows; only first 1500 sent.]` : "";
  const csvText = sample.map(r => r.map(v => {
    let s = String(v).replace(/\r\n?/g, "\n");
    s = s.replace(/\n+/g, " // ").replace(/[ \t]+/g, " ").trim();
    return s.length > 500 ? s.slice(0, 500) + "…" : s;
  }).join(" | ")).join("\n") + truncated;

  const today = isoDate(new Date());
  const sheetLine = sheetHint ? `Sheet name: "${sheetHint}". Use this as a hint for project name, month, year, or category.\n\n` : "";
  const system = [{
    type: "text",
    text: "You parse spreadsheet data into a personal project manager's data model. The app has projects (name, color hex, list of active months) and tasks (title, ISO date YYYY-MM-DD, status one of todo/doing/done, and a projectName). Given pipe-separated spreadsheet rows, detect the layout and extract every task. Layouts you must handle:\n\n(A) ROW-PER-TASK TABLES: each row is one task with columns like title/date/project/status. Detect whether the first row is a header.\n\n(B) CALENDAR GRIDS (very common): one early row contains a sequence of dates (e.g. `1/12/2026 | 1/13/2026 | 1/14/2026 …`), often preceded by a row of weekday names (`Monday | Tuesday | …`). Column A (and sometimes a few other left columns) contains PROJECT NAMES. Every non-empty cell at the intersection of a project row and a date column is a list of tasks for that project on that date. You MUST extract tasks from this layout — do NOT return zero tasks just because no header row matches a tabular schema.\n\nCELL CONTENTS: a single cell often contains MULTIPLE tasks. Where you see ` // ` inside a cell, it represents an original line break — split on it and treat each piece as a separate task. STATUS PREFIXES: when a task starts with `⬜️`, `⬜`, `☐`, `[ ]`, `□` → status `todo`; `🟡`, `🟠`, `🔵`, `⏳`, `[~]` → status `doing`; `✅`, `✔️`, `✓`, `☑`, `[x]`, `[X]` → status `done`. Strip the emoji/marker from the title.\n\nThe input may contain MULTIPLE SHEETS from one workbook; each sheet starts with a marker row formatted exactly as `### SHEET: <name>`. Treat each sheet independently — re-detect layout per sheet, and use the sheet name as a hint (project name, month, category, or tab label). Merge tasks from all sheets into a single output. Never silently drop data — either extract it into the output, or add a clear short entry to the `questions` array. If a row has no date, ask. If no status, default to `todo`. If no explicit color, omit it.\n\nCRITICAL DATE RULES: dates may span PAST and FUTURE months — never assume the current month or year as a default. Parse every date strictly from the data. For `3/15` or `Mar 15` without a year, infer from the sheet name, surrounding dates, or file title; only fall back to current year if there is genuinely no signal. Sheet names like `Jan 2026` or `2025-12` strongly indicate the month/year for every task in that sheet."
  }];

  const tools = [{
    name: "propose_import",
    description: "Propose the parsed import plan.",
    input_schema: {
      type: "object",
      properties: {
        headerDetected: { type: "string", description: "Comma-separated detected column mapping." },
        projects: {
          type: "array",
          items: {
            type: "object",
            properties: { name: { type: "string" }, color: { type: "string" } },
            required: ["name"]
          }
        },
        tasks: {
          type: "array",
          items: {
            type: "object",
            properties: {
              projectName: { type: "string" },
              title: { type: "string" },
              date: { type: "string", description: "ISO YYYY-MM-DD" },
              status: { type: "string", enum: STATUSES }
            },
            required: ["projectName", "title", "date", "status"]
          }
        },
        questions: {
          type: "array",
          items: { type: "string" },
          description: "Open clarifying questions. Empty array if none."
        }
      },
      required: ["projects", "tasks", "questions"]
    }
  }];

  const body = {
    model: CLAUDE_MODEL,
    max_tokens: 4000,
    system,
    tools,
    tool_choice: { type: "tool", name: "propose_import" },
    messages: [{ role: "user", content: `Today is ${today}. ${sheetLine}Parse this spreadsheet:\n\n${csvText}` }]
  };

  const res = await fetch(CLAUDE_API_URL, {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).slice(0, 200)}`);
  const data = await res.json();
  const toolBlock = (data.content || []).find(b => b.type === "tool_use");
  if (!toolBlock) throw new Error("AI did not return a proposal.");
  const result = toolBlock.input;
  if (sheetHint) {
    result.projects = result.projects || [];
    result.tasks = result.tasks || [];
    result.tasks.forEach(t => {
      t._sourceSheet = sheetHint;
      if (!t.projectName || !String(t.projectName).trim()) t.projectName = sheetHint;
    });
    const hasTasksFromSheet = result.tasks.some(t =>
      t.projectName && t.projectName.toLowerCase() === sheetHint.toLowerCase()
    );
    const projectAlreadyListed = result.projects.some(p =>
      p && p.name && p.name.toLowerCase() === sheetHint.toLowerCase()
    );
    if (hasTasksFromSheet && !projectAlreadyListed) {
      result.projects.push({ name: sheetHint });
    }
    result._sheetNames = [sheetHint];
  }
  return result;
}

function mergeImportPlans(parts) {
  const projects = [];
  const projSeen = new Set();
  const tasks = [];
  const questions = [];
  const headers = [];
  const sheetNames = [];
  parts.forEach(p => {
    if (!p) return;
    (p.projects || []).forEach(pr => {
      const key = String(pr.name || "").toLowerCase();
      if (key && !projSeen.has(key)) {
        projSeen.add(key);
        projects.push(pr);
      }
    });
    tasks.push(...(p.tasks || []));
    questions.push(...(p.questions || []));
    if (p.headerDetected) headers.push(p.headerDetected);
    if (Array.isArray(p._sheetNames)) sheetNames.push(...p._sheetNames);
  });
  return { projects, tasks, questions, headerDetected: headers.join(" | "), _sheetNames: sheetNames };
}

async function dedupeImportPlan(plan) {
  const incoming = (plan.tasks || []).filter(t => t && t.title && t.date && t.projectName);
  if (incoming.length === 0) return plan;

  const projNameById = {};
  state.projects.forEach(p => { projNameById[p.id] = p.name; });
  const exactKey = (proj, date, title) => `${String(proj || "").toLowerCase()}|${date}|${normTitle(title)}`;
  const existingByKey = new Map();
  state.tasks.forEach(t => {
    const pname = projNameById[t.projectId] || "";
    existingByKey.set(exactKey(pname, t.date, t.title), t.id);
  });

  const exactMatched = [];
  const survivors = [];
  incoming.forEach(t => {
    const k = exactKey(t.projectName, t.date, t.title);
    if (existingByKey.has(k)) {
      exactMatched.push({ idx: -1, existingId: existingByKey.get(k), reason: "exact match" });
    } else {
      survivors.push(t);
    }
  });

  let aiMatched = [];
  const key = getApiKey();
  if (survivors.length > 0 && key) {
    const incomingProjects = new Set(survivors.map(t => String(t.projectName).toLowerCase()));
    const scopedExisting = state.tasks
      .filter(t => incomingProjects.has((projNameById[t.projectId] || "").toLowerCase()))
      .map(t => ({ id: t.id, projectName: projNameById[t.projectId] || "", title: t.title, date: t.date, status: t.status }));

    if (scopedExisting.length > 0) {
      try {
        const body = {
          model: CLAUDE_MODEL,
          max_tokens: 2000,
          system: [{ type: "text", text: "You compare incoming tasks against existing tasks in a project manager. Identify true duplicates ONLY when ALL of these match: (1) same project, (2) the same logical task wording, AND (3) the EXACT SAME date (YYYY-MM-DD). If the dates differ — even by one day, even if it looks like a carry-over or recurrence — they are NOT duplicates. Tasks in different months are NEVER duplicates of each other. Be conservative: when in doubt, do NOT mark as duplicate." }],
          tools: [{
            name: "dedupe",
            description: "Mark incoming tasks that already exist.",
            input_schema: {
              type: "object",
              properties: {
                duplicates: {
                  type: "array",
                  items: {
                    type: "object",
                    properties: {
                      idx: { type: "integer", description: "Index in the incoming array" },
                      existingId: { type: "string", description: "id of the matching existing task" },
                      reason: { type: "string" }
                    },
                    required: ["idx", "existingId"]
                  }
                }
              },
              required: ["duplicates"]
            }
          }],
          tool_choice: { type: "tool", name: "dedupe" },
          messages: [{
            role: "user",
            content: `Incoming tasks (by index):\n${JSON.stringify(survivors.map((t, i) => ({ idx: i, projectName: t.projectName, title: t.title, date: t.date, status: t.status })))}\n\nExisting tasks:\n${JSON.stringify(scopedExisting)}`
          }]
        };
        const res = await fetch(CLAUDE_API_URL, {
          method: "POST",
          headers: { "content-type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify(body)
        });
        if (res.ok) {
          const data = await res.json();
          const tb = (data.content || []).find(b => b.type === "tool_use");
          if (tb && Array.isArray(tb.input?.duplicates)) {
            aiMatched = tb.input.duplicates.filter(d => Number.isInteger(d.idx) && d.idx >= 0 && d.idx < survivors.length);
          }
        }
      } catch {}
    }
  }

  const aiDropIdx = new Set(aiMatched.map(d => d.idx));
  const finalTasks = survivors.filter((_, i) => !aiDropIdx.has(i));
  const droppedExact = exactMatched.length;
  const droppedAI = aiMatched.length;

  return { ...plan, tasks: finalTasks, _droppedExact: droppedExact, _droppedAI: droppedAI, _allParsedTasks: incoming };
}

async function handleSpreadsheetImport(file) {
  try {
    const name = (file.name || "").toLowerCase();
    if (name.endsWith(".xlsx") || name.endsWith(".xls")) {
      if (typeof XLSX === "undefined") throw new Error("XLSX library not loaded.");
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });

      const sheets = [];
      wb.SheetNames.forEach(sheetName => {
        const sheet = wb.Sheets[sheetName];
        const sheetRows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
        if (sheetRows.length) sheets.push({ name: sheetName, rows: sheetRows });
      });
      if (sheets.length === 0) { showToast("Empty file", "error"); return; }

      if (sheets.length === 1) {
        await importSelectedSheets(sheets);
        return;
      }

      showImportProgress(`Scanning ${sheets.length} sheets…`);
      const summaries = await aiSummarizeSheets(sheets);
      hideImportProgress();
      openSheetSelectionModal(sheets, summaries, (selected) => importSelectedSheets(selected));
    } else {
      const text = await file.text();
      const rows = parseCSV(text);
      if (rows.length === 0) { showToast("Empty file", "error"); return; }
      await importSelectedSheets([{ name: file.name || "CSV", rows }]);
    }
  } catch (e) {
    hideImportProgress();
    showToast(e.message || "Import failed", "error");
  }
}

async function importSelectedSheets(sheets) {
  try {
    const aiSheets = [];
    const preParsed = [];
    sheets.forEach(s => {
      const grid = parseCalendarGridSheet(s.rows, s.name);
      if (grid) preParsed.push(grid);
      else aiSheets.push(s);
    });
    if (aiSheets.length > 0) {
      showImportProgress(`Parsing ${aiSheets.length} sheet${aiSheets.length > 1 ? "s" : ""} with AI…${preParsed.length ? ` (${preParsed.length} grid sheet${preParsed.length > 1 ? "s" : ""} parsed locally)` : ""}`);
    } else {
      showImportProgress(`Parsed ${preParsed.length} calendar-grid sheet${preParsed.length > 1 ? "s" : ""} locally…`);
    }
    const aiParts = await Promise.all(aiSheets.map(async s => {
      try {
        return await parseImportedCSVWithAI(s.rows, s.name);
      } catch (e) {
        console.error(`Sheet "${s.name}" failed:`, e);
        return { projects: [], tasks: [], questions: [`Sheet "${s.name}" failed to parse: ${e.message}`], headerDetected: "" };
      }
    }));
    const parts = [...preParsed, ...aiParts];
    let plan = mergeImportPlans(parts);
    showImportProgress("Checking for duplicates…");
    plan = await dedupeImportPlan(plan);
    hideImportProgress();
    openImportPreview(plan);
  } catch (e) {
    hideImportProgress();
    showToast(e.message || "Import failed", "error");
  }
}

async function aiSummarizeSheets(sheets) {
  const key = getApiKey();
  if (!key) return sheets.map(() => ({ summary: "", suggestImport: true, monthHint: "" }));

  const payload = sheets.map((s, i) => {
    const head = s.rows.slice(0, 6).map(r => r.map(v => String(v).slice(0, 60)).join(" | ")).join("\n");
    return `=== Sheet #${i}: "${s.name}" (${s.rows.length} rows) ===\n${head}`;
  }).join("\n\n");

  try {
    const body = {
      model: CLAUDE_MODEL,
      max_tokens: 2000,
      system: [{ type: "text", text: "You preview spreadsheet sheets to help a user decide which to import into a project manager. For each sheet, return a one-line summary of what it appears to contain (project name, month, kind of data), whether you'd recommend importing it (true if it looks like task data, false if it looks like notes/totals/empty/unrelated), and the implied month if the sheet is clearly tied to a single month (YYYY-MM) — empty string if mixed or unknown." }],
      tools: [{
        name: "summarize_sheets",
        description: "One entry per sheet, in the same order.",
        input_schema: {
          type: "object",
          properties: {
            sheets: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  idx: { type: "integer" },
                  summary: { type: "string" },
                  suggestImport: { type: "boolean" },
                  monthHint: { type: "string", description: "YYYY-MM or empty" }
                },
                required: ["idx", "summary", "suggestImport"]
              }
            }
          },
          required: ["sheets"]
        }
      }],
      tool_choice: { type: "tool", name: "summarize_sheets" },
      messages: [{ role: "user", content: payload }]
    };
    const res = await fetch(CLAUDE_API_URL, {
      method: "POST",
      headers: { "content-type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error("scan failed");
    const data = await res.json();
    const tb = (data.content || []).find(b => b.type === "tool_use");
    const arr = tb?.input?.sheets || [];
    return sheets.map((_, i) => {
      const m = arr.find(x => x.idx === i) || {};
      return { summary: m.summary || "", suggestImport: m.suggestImport !== false, monthHint: m.monthHint || "" };
    });
  } catch {
    return sheets.map(() => ({ summary: "", suggestImport: true, monthHint: "" }));
  }
}

        </div>

    <div style="max-height:380px; overflow-y:auto; margin-bottom:10px;">
      ${items}
    </div>
    <div style="display:flex; gap:6px; margin-bottom:10px;">
      <button class="btn btn-sec" id="ssAll" style="font-size:12px;">Select all</button>

function openImportPreview(plan) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "modal";
  modal.style.maxWidth = "600px";

  const questions = plan.questions || [];
  const qHtml = questions.map((q, i) => `
    <div class="form-group">
      <label>Question ${i + 1}</label>
      <div style="font-size:13px; margin-bottom:6px;">${escapeHtml(q)}</div>
      <input type="text" id="q_${i}" placeholder="Your answer (blank = accept default)" />
    </div>
  `).join("");

  const preview = (plan.tasks || []).slice(0, 25).map(t =>
    `${escapeHtml(t.projectName || "—")} · ${escapeHtml(t.title || "—")} · ${escapeHtml(t.date || "—")} · ${escapeHtml(t.status || "todo")}`
  ).join("<br>");
  const more = Math.max(0, (plan.tasks || []).length - 25);

  const droppedExact = plan._droppedExact || 0;
  const droppedAI = plan._droppedAI || 0;
  const droppedTotal = droppedExact + droppedAI;
  const parsedTotal = (plan.tasks || []).length + droppedTotal;
  const allDropped = droppedTotal > 0 && (plan.tasks || []).length === 0;
  const dupLine = droppedTotal > 0
    ? `<div style="color:${allDropped ? "#ff3b30" : "#34c759"}; font-size:12px; margin-top:4px;">${allDropped ? "⚠ " : ""}Parsed ${parsedTotal} task(s); skipped ${droppedTotal} as duplicate(s) of tasks already in your project manager${droppedAI > 0 ? ` (${droppedExact} exact + ${droppedAI} AI-matched)` : ""}.${allDropped ? ` Use "Import anyway" below to import all ${parsedTotal}.` : ""}</div>`
    : "";

  const monthCounts = {};
  (plan.tasks || []).forEach(t => {
    if (!t.date) return;
    const m = t.date.slice(0, 7);
    monthCounts[m] = (monthCounts[m] || 0) + 1;
  });
  const monthEntries = Object.entries(monthCounts).sort();
  const newMonths = monthEntries.filter(([m]) => !state.months.includes(m)).map(([m]) => m);
  const breakdownLine = monthEntries.length > 0
    ? `<div style="font-size:12px; margin-top:4px;"><b>By month:</b> ${monthEntries.map(([m, n]) => `${escapeHtml(monthLabel(m))} (${n})`).join(", ")}${newMonths.length > 0 ? ` <span style="color:#0071e3;">— will create ${newMonths.length} new tab(s)</span>` : ""}</div>`
    : "";

  const sheetCounts = {};
  const allSheets = Array.isArray(plan._sheetNames) ? plan._sheetNames : [];
  allSheets.forEach(s => { sheetCounts[s] = 0; });
  (plan.tasks || []).forEach(t => {
    const s = t._sourceSheet;
    if (s) sheetCounts[s] = (sheetCounts[s] || 0) + 1;
  });
  const sheetEntries = Object.entries(sheetCounts);
  const zeroSheets = sheetEntries.filter(([, n]) => n === 0).map(([s]) => s);
  const sheetLine = sheetEntries.length > 0
    ? `<div style="font-size:12px; margin-top:4px;"><b>By sheet:</b> ${sheetEntries.map(([s, n]) => `${escapeHtml(s)} (${n})`).join(", ")}</div>`
    : "";
  const zeroWarn = zeroSheets.length > 0
    ? `<div style="color:#ff9500; font-size:12px; margin-top:4px;">⚠ No tasks extracted from: ${zeroSheets.map(escapeHtml).join(", ")}. Check if these sheets actually contain task data.</div>`
    : "";

  modal.innerHTML = `
    <h2>📥 Review import</h2>
    <div style="font-size:13px; color:#6e6e73; margin-bottom:14px;">
      <b>Detected columns:</b> ${escapeHtml(plan.headerDetected || "unknown")}<br>
      ${(plan.projects || []).length} project(s), ${(plan.tasks || []).length} task(s).
      ${sheetLine}
      ${breakdownLine}
      ${dupLine}
      ${zeroWarn}
    </div>
    ${questions.length ? `<div style="font-size:13px; font-weight:600; margin-bottom:6px; color:#ff9500;">⚠ AI needs clarification before importing</div>${qHtml}` : ""}
    <div style="max-height:220px; overflow-y:auto; background:#f5f5f7; border-radius:8px; padding:10px; font-size:11px; font-family:ui-monospace,Menlo,monospace; line-height:1.5;">
      ${preview || "<i>No tasks extracted.</i>"}
      ${more > 0 ? `<br><i>…+${more} more</i>` : ""}
    </div>
    <div class="modal-actions">
      <button class="btn btn-sec" id="iCancel">Cancel</button>
      ${droppedTotal > 0 ? `<button class="btn btn-sec" id="iForce" title="Import the ${parsedTotal} parsed tasks ignoring duplicate detection">Import anyway (${parsedTotal})</button>` : ""}
      <button class="btn" id="iConfirm">${questions.length ? "Import with these answers" : `Import (${(plan.tasks || []).length})`}</button>
    </div>
  `;
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  backdrop.onclick = (e) => { if (e.target === backdrop) document.body.removeChild(backdrop); };
  modal.querySelector("#iCancel").onclick = () => document.body.removeChild(backdrop);
  if (droppedTotal > 0) {
    modal.querySelector("#iForce").onclick = () => {
      document.body.removeChild(backdrop);
      const forced = { ...plan, tasks: plan._allParsedTasks || plan.tasks, _droppedExact: 0, _droppedAI: 0 };
      applyImportPlan(forced);
    };
  }
  modal.querySelector("#iConfirm").onclick = () => {
    const answers = questions.map((_, i) => modal.querySelector(`#q_${i}`).value.trim());
    document.body.removeChild(backdrop);
    if (answers.some(a => a.length > 0)) {
      refineImportWithAnswers(plan, questions, answers);
    } else {
      applyImportPlan(plan);
    }
  };
}

async function refineImportWithAnswers(plan, questions, answers) {
  const key = getApiKey();
  if (!key) { applyImportPlan(plan); return; }
  showToast("Refining with your answers…");
  try {
    const qa = questions.map((q, i) => `Q: ${q}\nA: ${answers[i] || "(no answer — use default)"}`).join("\n\n");
    const body = {
      model: CLAUDE_MODEL,
      max_tokens: 4000,
      system: [{ type: "text", text: "You previously proposed an import plan and raised clarifying questions. The user has now answered. Return a revised propose_import result incorporating the answers. Keep questions empty unless something is still ambiguous." }],
      tools: [{
        name: "propose_import",
        description: "Revised import plan.",
        input_schema: {
          type: "object",
          properties: {
            headerDetected: { type: "string" },
            projects: { type: "array", items: { type: "object", properties: { name: { type: "string" }, color: { type: "string" } }, required: ["name"] } },
            tasks: { type: "array", items: { type: "object", properties: { projectName: { type: "string" }, title: { type: "string" }, date: { type: "string" }, status: { type: "string", enum: STATUSES } }, required: ["projectName", "title", "date", "status"] } },
            questions: { type: "array", items: { type: "string" } }
          },
          required: ["projects", "tasks", "questions"]
        }
      }],
      tool_choice: { type: "tool", name: "propose_import" },
      messages: [
        { role: "user", content: `Previous proposal:\n${JSON.stringify(plan)}\n\nAnswers to your questions:\n${qa}` }
      ]
    };
    const res = await fetch(CLAUDE_API_URL, {
      method: "POST",
      headers: { "content-type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).slice(0, 200)}`);
    const data = await res.json();
    const toolBlock = (data.content || []).find(b => b.type === "tool_use");
    if (!toolBlock) throw new Error("AI did not refine the plan.");
    openImportPreview(toolBlock.input);
  } catch (e) {
    showToast(e.message || "Refinement failed", "error");
  }
}

function applyImportPlan(plan) {
  const projMap = {};
  (plan.projects || []).forEach(p => {
    if (!p.name) return;
    const existing = state.projects.find(x => x.name.toLowerCase() === p.name.toLowerCase());
    if (existing) { projMap[p.name.toLowerCase()] = existing.id; return; }
    const id = uid();
    state.projects.push({
      id,
      name: p.name,
      color: normalizeHex(p.color) || COLORS[state.projects.length % COLORS.length],
      months: []
    });
    projMap[p.name.toLowerCase()] = id;
  });

  let added = 0;
  let droppedNoProject = 0;
  const touchedMonths = new Set();
  (plan.tasks || []).forEach(t => {
    if (!t.title || !t.date) return;
    if (!t.projectName || !String(t.projectName).trim()) {
      if (t._sourceSheet) t.projectName = t._sourceSheet;
      else { droppedNoProject++; return; }
    }
    const key = t.projectName.toLowerCase();
    let pid = projMap[key];
    if (!pid) {
      const existing = state.projects.find(x => x.name.toLowerCase() === key);
      if (existing) {
        pid = existing.id;
      } else {
        pid = uid();
        state.projects.push({
          id: pid,
          name: t.projectName,
          color: COLORS[state.projects.length % COLORS.length],
          months: []
        });
      }
      projMap[key] = pid;
    }
    const m = t.date.slice(0, 7);
    if (!state.months.includes(m)) state.months.push(m);
    const proj = state.projects.find(x => x.id === pid);
    if (proj && !proj.months.includes(m)) proj.months.push(m);
    touchedMonths.add(m);
    const nt = {
      id: uid(),
      projectId: pid,
      title: t.title,
      date: t.date,
      status: STATUSES.includes(t.status) ? t.status : "todo"
    };
    state.tasks.push(nt);
    attachToSeries(nt);
    added++;
  });

  if (touchedMonths.size > 0 && !touchedMonths.has(state.activeMonth)) {
    const earliest = [...touchedMonths].sort()[0];
    state.activeMonth = earliest;
    state.anchorDate = `${earliest}-01`;
  }

  saveState();
  render();
  const monthList = [...touchedMonths].sort().map(m => monthLabel(m)).join(", ");
  const monthsMsg = touchedMonths.size > 1 ? ` across ${touchedMonths.size} months (${monthList})` : (touchedMonths.size === 1 ? ` (${monthList})` : "");
  const droppedMsg = droppedNoProject > 0 ? ` · ${droppedNoProject} skipped (no project)` : "";
  showToast(`Imported ${added} task(s)${monthsMsg}${droppedMsg}`, "success");
}

async function handleQuickAdd(text) {
  const input = document.getElementById("quickAddInput");
  const status = document.getElementById("quickAddStatus");
  status.className = "quick-add-status";
  status.textContent = "Thinking…";
  input.disabled = true;

  try {
    const parsed = await parseQuickAdd(text);
    const { title, date, projectName, status: st } = parsed;
    if (!title || !date || !projectName) throw new Error("Missing fields from AI response.");

    const match = state.projects.find(p => p.name.toLowerCase() === projectName.toLowerCase());
    const projectId = match ? addProject(match.name) : addProject(projectName);

    const taskMonth = date.slice(0, 7);
    if (!state.months.includes(taskMonth)) state.months.push(taskMonth);
    const proj = state.projects.find(p => p.id === projectId);
    if (proj && !proj.months.includes(taskMonth)) proj.months.push(taskMonth);

    const nt = { id: uid(), projectId, title, date, status: STATUSES.includes(st) ? st : "todo" };
    state.tasks.push(nt);
    attachToSeries(nt);
    saveState();
    render();

    input.value = "";
    status.className = "quick-add-status success";
    status.textContent = `✓ ${projectName} · ${date}`;
    showToast(`Added "${title}" to ${projectName}`, "success");
  } catch (e) {
    status.className = "quick-add-status error";
    status.textContent = "Error";
    showToast(e.message || "Quick add failed", "error");
  } finally {
    input.disabled = false;
    input.focus();
    setTimeout(() => { if (status.textContent && !input.value) status.textContent = ""; }, 3500);
  }
}

async function pushToRemote() {

function weatherEmoji(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "⛅";
  if (code <= 48) return "🌫️";
  if (code <= 57) return "🌦️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌦️";
  if (code <= 86) return "🌨️";
  if (code <= 99) return "⛈️";
  return "🌡";
}
function loadWeather() {
  const el = document.getElementById("headerWeather");
  if (!navigator.geolocation) { el.textContent = "Weather unavailable"; return; }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`;
      const r = await fetch(url);
      const d = await r.json();
      const temp = Math.round(d.current.temperature_2m);
      const code = d.current.weather_code;
      el.textContent = `${weatherEmoji(code)} ${temp}°F`;
    } catch (e) {
      el.textContent = "Weather unavailable";
    }
  }, () => {
    el.textContent = "Weather needs location permission";
  }, { maximumAge: 10 * 60 * 1000, timeout: 10000 });
}

/* =========================================================
   Rubber-band selection (mouse drag to select multiple tasks)
   ========================================================= */
(function initRubberBand() {
  const RB_THRESHOLD = 5;
  const SKIP_SELECTOR = ".task, button, input, textarea, select, a, label, " +
    ".modal, .modal-backdrop, .ctx-menu, .selection-bar, .month-picker-menu, " +
    ".auth-backdrop, .project-label, .header-sync, .drag-handle, " +
    ".row-resize-handle, .task-actions, .month-tab, .nav-arrow, .group-header";
  let start = null;
  let box = null;
  let baseSelection = null;

  const onDown = (e) => {
    if (e.button !== 0) return;
    if (e.target.closest(SKIP_SELECTOR)) return;
    if (!e.target.closest("main, #unfinishedPanel")) return;
    start = {
      x: e.pageX, y: e.pageY,
      additive: e.shiftKey || e.metaKey || e.ctrlKey,
      open: false
    };
  };

  const onMove = (e) => {
    if (!start) return;
    const dx = e.pageX - start.x;
    const dy = e.pageY - start.y;
    if (!start.open) {
      if (Math.abs(dx) < RB_THRESHOLD && Math.abs(dy) < RB_THRESHOLD) return;
      start.open = true;
      box = document.createElement("div");
      box.className = "rubber-band";
      document.body.appendChild(box);
      document.body.classList.add("rb-active");
      baseSelection = start.additive ? new Set(selectedTaskIds) : new Set();
      if (!start.additive) {
        selectedTaskIds.clear();
        document.querySelectorAll(".task.selected").forEach(x => x.classList.remove("selected"));
      }
    }
    const x1 = Math.min(start.x, e.pageX);
    const y1 = Math.min(start.y, e.pageY);
    const w = Math.abs(dx);
    const h = Math.abs(dy);
    box.style.left = x1 + "px";
    box.style.top = y1 + "px";
    box.style.width = w + "px";
    box.style.height = h + "px";

    const rect = { left: x1, top: y1, right: x1 + w, bottom: y1 + h };
    const next = new Set(baseSelection);
    document.querySelectorAll(".task").forEach(el => {
      const r = el.getBoundingClientRect();
      const pr = {
        left: r.left + window.scrollX,
        top: r.top + window.scrollY,
        right: r.right + window.scrollX,
        bottom: r.bottom + window.scrollY
      };
      const hit = !(pr.right < rect.left || pr.left > rect.right ||
                    pr.bottom < rect.top || pr.top > rect.bottom);
      const id = el.dataset.taskId;
      if (!id) return;
      if (hit) next.add(id);
    });
    selectedTaskIds.clear();
    next.forEach(id => selectedTaskIds.add(id));
    document.querySelectorAll(".task").forEach(el => {
      const id = el.dataset.taskId;
      el.classList.toggle("selected", id ? selectedTaskIds.has(id) : false);
    });
    e.preventDefault();
  };

  const onUp = (e) => {
    if (!start) return;
    const wasOpen = start.open;
    start = null;
    baseSelection = null;
    if (box) { box.remove(); box = null; }
    document.body.classList.remove("rb-active");
    if (wasOpen) {
      updateSelectionBar();
      const swallow = (ev) => {
        ev.stopPropagation();
        ev.preventDefault();
        document.removeEventListener("click", swallow, true);
      };
      document.addEventListener("click", swallow, true);
      e.preventDefault();
    }
  };

  document.addEventListener("pointerdown", onDown);
  document.addEventListener("pointermove", onMove);
  document.addEventListener("pointerup", onUp);
  document.addEventListener("pointercancel", onUp);
})();
